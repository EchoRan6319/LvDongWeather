name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-android-windows-web:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - android
          - windows
          - web
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.3'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        if: matrix.target == 'android'
        run: flutter build apk --release --target-platform android-arm64

      - name: Build Windows
        if: matrix.target == 'windows'
        run: flutter build windows --release

      - name: Build Web
        if: matrix.target == 'web'
        run: flutter build web --release

      - name: Upload artifacts
        if: matrix.target == 'android' || matrix.target == 'windows' || matrix.target == 'web'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-build
          path: ${{ matrix.target == 'android' ? 'build/app/outputs/flutter-apk/app-release.apk' : matrix.target == 'windows' ? 'build/windows/x64/runner/Release/pureweather.exe' : 'build/web' }}
          retention-days: 1

  build-macos-ios:
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - macos
          - ios
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.3'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        if: matrix.target == 'macos'
        run: flutter build macos --release

      - name: Build iOS
        if: matrix.target == 'ios'
        run: flutter build ios --release --no-codesign

      - name: Upload macOS artifact
        if: matrix.target == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: build/macos/Build/Products/Release/pureweather.app
          retention-days: 1

      - name: Upload iOS artifact
        if: matrix.target == 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: build/ios/iphoneos/Runner.app
          retention-days: 1

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.3'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Create Debian package
        run: |
          mkdir -p artifacts/linux
          cp -r build/linux/x64/release/bundle artifacts/linux/
          cd artifacts/linux
          echo 'Package: pureweather
Version: 1.0.0
Section: utils
Priority: optional
Architecture: amd64
Depends: libgtk-3-0, libstdc++6
Maintainer: EchoRan
Description: A modern weather app built with Flutter' > control
          tar -czf data.tar.gz bundle
          tar -czf control.tar.gz control
          echo '2.0' > debian-binary
          ar r pureweather.deb debian-binary control.tar.gz data.tar.gz

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: artifacts/linux/pureweather.deb
          retention-days: 1

  release:
    needs: [build-android-windows-web, build-macos-ios, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-build
          path: artifacts/android

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/windows

      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: artifacts/web

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: artifacts/macos

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-build
          path: artifacts/ios

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: artifacts/linux

      - name: Zip Web build
        run: |
          cd artifacts/web
          zip -r ../pureweather-web.zip .

      - name: Zip macOS build
        run: |
          cd artifacts/macos
          zip -r ../pureweather-macos.zip pureweather.app

      - name: Zip iOS build
        run: |
          cd artifacts/ios
          zip -r ../pureweather-ios.zip Runner.app

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files:
            - artifacts/android/app-release.apk
            - artifacts/windows/pureweather.exe
            - artifacts/pureweather-web.zip
            - artifacts/pureweather-macos.zip
            - artifacts/pureweather-ios.zip
            - artifacts/linux/pureweather.deb
          asset_names:
            - PureWeather-${{ github.ref_name }}-android.apk
            - PureWeather-${{ github.ref_name }}-windows.exe
            - PureWeather-${{ github.ref_name }}-web.zip
            - PureWeather-${{ github.ref_name }}-macos.zip
            - PureWeather-${{ github.ref_name }}-ios.zip
            - PureWeather-${{ github.ref_name }}-linux.deb
