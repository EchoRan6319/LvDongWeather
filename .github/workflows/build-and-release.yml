          Compress-Archive -Path "build/windows/arm64/runner/Release/*" -DestinationPath "build/windows/arm64/runner/PureWeather-$env:GITHUB_REF_NAME-windows-arm64-release.zip" -Force

      - name: Upload Windows ARM64 artifact
        uses: actions/upload-artifact@v4.6.1
        with:
          name: windows-package-arm64
