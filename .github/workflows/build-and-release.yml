            --dart-define=AMAP_WEB_KEY="$AMAP_WEB_KEY" \
            --dart-define=DEEPSEEK_API_KEY="$DEEPSEEK_API_KEY"

      - name: Prepare Android artifact (arm32)
        run: cp build/app/outputs/flutter-apk/app-release.apk "build/app/outputs/flutter-apk/PureWeather-${GITHUB_REF_NAME}-android-armeabi-v7a-release.apk"

      - name: Upload Android artifact (arm32)
        uses: actions/upload-artifact@v4.6.1
        with:
          name: android-apk-arm32
          path: build/app/outputs/flutter-apk/PureWeather-*-android-armeabi-v7a-release.apk
