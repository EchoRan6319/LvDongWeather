          flutter build ios --release --no-codesign \
            --build-name="$BUILD_NAME" \
            --build-number="$GITHUB_RUN_NUMBER" \
            --dart-define=QWEATHER_API_KEY="$QWEATHER_API_KEY" \
            --dart-define=CAIYUN_API_KEY="$CAIYUN_API_KEY" \
            --dart-define=AMAP_API_KEY="$AMAP_API_KEY" \
            --dart-define=AMAP_WEB_KEY="$AMAP_WEB_KEY" \
            --dart-define=DEEPSEEK_API_KEY="$DEEPSEEK_API_KEY"

      - name: Package iOS artifact (Unsigned IPA)
        run: |
          IOS_APP_PATH="$(find build/ios/iphoneos -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "$IOS_APP_PATH" ]; then
            echo "iOS app bundle not found"
            exit 1
          fi
          # Create Payload folder and copy .app into it
          mkdir -p build/ios/Payload
          cp -r "$IOS_APP_PATH" build/ios/Payload/
          # Zip Payload folder to create unsigned IPA
          cd build/ios && zip -r "PureWeather-${GITHUB_REF_NAME}-ios-release-unsigned.ipa" Payload
          rm -rf Payload

      - name: Build macOS (Universal Binary)
        env:
          QWEATHER_API_KEY: ${{ secrets.QWEATHER_API_KEY }}
          CAIYUN_API_KEY: ${{ secrets.CAIYUN_API_KEY }}
          AMAP_API_KEY: ${{ secrets.AMAP_API_KEY }}
          AMAP_WEB_KEY: ${{ secrets.AMAP_WEB_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          BUILD_NAME="${GITHUB_REF_NAME#v}"
          flutter build macos --release \
            --build-name="$BUILD_NAME" \
            --build-number="$GITHUB_RUN_NUMBER" \
            --dart-define=QWEATHER_API_KEY="$QWEATHER_API_KEY" \
            --dart-define=CAIYUN_API_KEY="$CAIYUN_API_KEY" \
            --dart-define=AMAP_API_KEY="$AMAP_API_KEY" \
            --dart-define=AMAP_WEB_KEY="$AMAP_WEB_KEY" \
            --dart-define=DEEPSEEK_API_KEY="$DEEPSEEK_API_KEY"

      - name: Package macOS artifact (Universal DMG)
        run: |
          MACOS_APP_PATH="$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' -print -quit)"
          if [ -z "$MACOS_APP_PATH" ]; then
            echo "macOS app bundle not found"
            exit 1
          fi
          # Create DMG with create-dmg tool
          brew install create-dmg || true
          create-dmg \
            --volname "PureWeather" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 450 185 \
            "build/macos/PureWeather-${GITHUB_REF_NAME}-macos-universal.dmg" \
            "$MACOS_APP_PATH" || \
          # Fallback to zip if create-dmg fails
          ditto -c -k --sequesterRsrc --keepParent "$MACOS_APP_PATH" "build/macos/PureWeather-${GITHUB_REF_NAME}-macos-universal.zip"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4.6.1
        with:
          name: ios-package
          path: build/ios/PureWeather-*-ios-release-unsigned.ipa
          if-no-files-found: error

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4.6.1
        with:
          name: macos-package
          path: build/macos/PureWeather-*-macos-universal.*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs:
      - build-android-arm64
      - build-android-arm32
      - build-android-x86_64
      - build-android-universal
      - build-windows-x86_64
      - build-windows-arm64
      - build-linux-web
      - build-apple
    steps:
      - name: Download Android artifact (arm64)
        uses: actions/download-artifact@v4.1.9
        with:
          name: android-apk-arm64
          path: dist/android

      - name: Download Android artifact (arm32)
        uses: actions/download-artifact@v4.1.9
        with:
          name: android-apk-arm32
          path: dist/android

      - name: Download Android artifact (x86_64)
        uses: actions/download-artifact@v4.1.9
        with:
          name: android-apk-x86_64
          path: dist/android

      - name: Download Android artifact (universal)
        uses: actions/download-artifact@v4.1.9
        with:
          name: android-apk-universal
          path: dist/android

      - name: Download Windows artifact (x86_64)
        uses: actions/download-artifact@v4.1.9
        with:
          name: windows-package-x86_64
          path: dist/windows

      - name: Download Windows artifact (ARM64)
        uses: actions/download-artifact@v4.1.9
        with:
          name: windows-package-arm64
          path: dist/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v4.1.9
        with:
          name: linux-package
          path: dist/linux

      - name: Download Web artifact
        uses: actions/download-artifact@v4.1.9
        with:
          name: web-package
          path: dist/web

      - name: Download iOS artifact
        uses: actions/download-artifact@v4.1.9
        with:
          name: ios-package
          path: dist/ios

      - name: Download macOS artifact
        uses: actions/download-artifact@v4.1.9
        with:
          name: macos-package
          path: dist/macos

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          files: |
            dist/android/*.apk
            dist/windows/*.zip
            dist/linux/*.tar.gz
            dist/web/*.zip
            dist/ios/*.ipa
            dist/macos/*.dmg
             dist/macos/*.zip
